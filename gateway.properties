server.port=8084

#Gateway
spring.cloud.gateway.routes[0].id=company_service
#spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].uri=lb://COMPANY-SERVICE
spring.cloud.gateway.routes[0].predicates=Path=/companies/**

spring.cloud.gateway.routes[1].id=job_service
#spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.routes[1].predicates=Path=/jobs/**

spring.cloud.gateway.routes[2].id=review_service
#spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[2].predicates=Path=/reviews/**

#When this route matches, forward the request from localhost:8084 to localhost:8761
spring.cloud.gateway.routes[3].id=eureka_server
spring.cloud.gateway.routes[3].uri=http://localhost:8761
spring.cloud.gateway.routes[3].predicates=Path=/eureka/main
spring.cloud.gateway.routes[3].filters[0]=SetPath=/

#The Eureka Server page at http://localhost:8761/ is rendered correctly,
#but Eureka Server page at http://localhost:8084/eureka/main is not rendered correctly.
#We need to forward CSS and JS to Eureka Server, so the page renders correctly
spring.cloud.gateway.routes[4].id=eureka_server_static
spring.cloud.gateway.routes[4].uri=http://localhost:8761
spring.cloud.gateway.routes[4].predicates=Path=/eureka/**

#Logging
logging.level.root=info
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE