server.port=8082

#PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/job

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

#Resilience4J company circuit breaker
resilience4j.circuitbreaker.instances.companyBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.companyBreaker.slidingWindowSize=20
resilience4j.circuitbreaker.instances.companyBreaker.minimumNumberOfCalls=15
resilience4j.circuitbreaker.instances.companyBreaker.permittedNumberOfCallsInHalfOpenState=6
resilience4j.circuitbreaker.instances.companyBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.companyBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.companyBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.companyBreaker.sliding-window-type=count_based

#Resilience4J company retry
resilience4j.retry.instances.companyRetry.max-attempts=3
resilience4j.retry.instances.companyRetry.wait-duration=2s

#Resilience4J reviews circuit breaker
resilience4j.circuitbreaker.instances.reviewBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.reviewBreaker.slidingWindowSize=20
resilience4j.circuitbreaker.instances.reviewBreaker.minimumNumberOfCalls=15
resilience4j.circuitbreaker.instances.reviewBreaker.permittedNumberOfCallsInHalfOpenState=6
resilience4j.circuitbreaker.instances.reviewBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.reviewBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.reviewBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.reviewBreaker.sliding-window-type=count_based

#Resilience4J reviews retry
resilience4j.retry.instances.reviewRetry.max-attempts=3
resilience4j.retry.instances.reviewRetry.wait-duration=2s

#Resilience4J rate limiting
resilience4j.ratelimiter.instances.getJobsRateLimiter.timeoutDuration=0s
resilience4j.ratelimiter.instances.getJobsRateLimiter.limitRefreshPeriod=4s
resilience4j.ratelimiter.instances.getJobsRateLimiter.limitForPeriod=2